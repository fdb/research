<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>spektrum · ICLC talk proposal</title>
    <meta
      name="description"
      content="Laying Tracks While the Train Is Running — ICLC performance-lecture proposal on the spectrum of live-coding instruments."
    />
    <link rel="stylesheet" href="/styles.css" />
    <link rel="stylesheet" href="spektrum.css" />
    <style>
      .talk table { border-collapse: collapse; width: 100%; margin: 1rem 0; font-size: 0.85rem; }
      .talk th, .talk td { border: 1px solid var(--border); padding: 0.35rem 0.6rem; text-align: left; }
      .talk th { font-weight: 650; }
      .talk h1 { margin-bottom: 0.2rem; }
      .talk h1 + h2 { color: var(--muted); font-weight: 400; font-size: 1.05rem; margin-top: 0; }
    </style>
  </head>
  <body class="essay talk">
    <main class="wrap">
      <p><a href="./">← spektrum</a> · <a href="lab.html">open the lab ▶</a> ·
        <a href="talk.md">plain-text source (for the submission form)</a></p>
      <article id="talk">loading…</article>
    </main>
    <script type="module">
      // minimal markdown renderer — enough for talk.md, nothing more
      function md(src) {
        const esc = (s) => s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
        const inline = (s) =>
          esc(s)
            .replace(/`([^`]+)`/g, "<code>$1</code>")
            .replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>")
            .replace(/\*([^*]+)\*/g, "<em>$1</em>")
            .replace(/(?<![\w>])((?:https?:\/\/|research\.enigmeta|github\.com)[^\s<)]+)/g, (m) => {
              const href = m.startsWith("http") ? m : "https://" + m;
              return `<a href="${href}">${m}</a>`;
            });
        const lines = src.split("\n");
        const out = [];
        let i = 0;
        while (i < lines.length) {
          const line = lines[i];
          if (/^\s*$/.test(line)) { i++; continue; }
          if (/^---+\s*$/.test(line)) { out.push("<hr />"); i++; continue; }
          const h = /^(#{1,4})\s+(.*)$/.exec(line);
          if (h) { out.push(`<h${h[1].length}>${inline(h[2])}</h${h[1].length}>`); i++; continue; }
          if (/^\|/.test(line)) {
            const rows = [];
            while (i < lines.length && /^\|/.test(lines[i])) {
              if (!/^\|[\s:|-]+\|$/.test(lines[i].trim())) {
                rows.push(lines[i].trim().replace(/^\||\|$/g, "").split("|").map((c) => c.trim()));
              }
              i++;
            }
            const [head, ...body] = rows;
            out.push("<table><thead><tr>" + head.map((c) => `<th>${inline(c)}</th>`).join("") +
              "</tr></thead><tbody>" + body.map((r) => "<tr>" + r.map((c) => `<td>${inline(c)}</td>`).join("") + "</tr>").join("") +
              "</tbody></table>");
            continue;
          }
          if (/^[-*]\s+/.test(line) || /^\d+\.\s+/.test(line)) {
            const ordered = /^\d+\./.test(line);
            const items = [];
            while (i < lines.length && (/^[-*]\s+/.test(lines[i]) || /^\d+\.\s+/.test(lines[i]) || /^\s{2,}\S/.test(lines[i]))) {
              if (/^\s{2,}\S/.test(lines[i]) && items.length) items[items.length - 1] += " " + lines[i].trim();
              else items.push(lines[i].replace(/^([-*]|\d+\.)\s+/, ""));
              i++;
            }
            const tag = ordered ? "ol" : "ul";
            out.push(`<${tag}>` + items.map((it) => `<li>${inline(it)}</li>`).join("") + `</${tag}>`);
            continue;
          }
          // paragraph: gather until blank
          const para = [];
          while (i < lines.length && !/^\s*$/.test(lines[i]) && !/^(#|\||[-*]\s|\d+\.\s|---)/.test(lines[i])) {
            para.push(lines[i]);
            i++;
          }
          out.push(`<p>${inline(para.join(" "))}</p>`);
        }
        return out.join("\n");
      }

      const el = document.getElementById("talk");
      try {
        const res = await fetch("talk.md");
        if (!res.ok) throw new Error(res.status);
        el.innerHTML = md(await res.text());
      } catch {
        el.innerHTML = '<p>Could not load <a href="talk.md">talk.md</a> — open it directly.</p>';
      }
    </script>
  </body>
</html>
