<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>NodeBox · unified web prototype</title>
    <meta
      name="description"
      content="A no-build web prototype unifying NodeBox (Java) and NodeBox Live: list-matching evaluation, subnetworks AND code nodes."
    />
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Crect width='16' height='16' fill='%23111'/%3E%3Crect x='2' y='2' width='5' height='3' fill='%23a78bfa'/%3E%3Crect x='9' y='6' width='5' height='3' fill='%23fff'/%3E%3Crect x='2' y='11' width='5' height='3' fill='%23999'/%3E%3Cpath d='M4.5 5v6M11.5 3.5v2.5' stroke='%23666'/%3E%3C/svg%3E"
    />
    <meta name="theme-color" content="#0a0a0a" />

    <!-- No build step: React + htm via ES import map, Tailwind via CDN. -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script type="importmap">
      {
        "imports": {
          "react": "https://esm.sh/react@19.1.0",
          "react-dom/client": "https://esm.sh/react-dom@19.1.0/client",
          "htm": "https://esm.sh/htm@3.1.1"
        }
      }
    </script>
    <style>
      /* Pre-Tailwind shell so the loading state isn't unstyled. */
      html,
      body {
        margin: 0;
        height: 100%;
        background: #0a0a0a;
        color: #d4d4d4;
        font-family: system-ui, sans-serif;
      }
      #root {
        height: 100%;
      }
      .boot {
        display: flex;
        height: 100%;
        align-items: center;
        justify-content: center;
        font-size: 13px;
        color: #737373;
      }
    </style>
  </head>
  <body>
    <div id="root"><div class="boot">loading nodebox…</div></div>
    <script type="module">
      import("./ui/main.js").catch((e) => {
        document.querySelector(".boot").textContent =
          "Failed to load: " + e.message + " — the demo needs network access to esm.sh.";
        console.error(e);
      });
    </script>
  </body>
</html>
